[alembic]
# Path to migration scripts
script_location = alembic

# Template for generating migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration files
timezone = UTC

# sys.path for importing app code (project root)
prepend_sys_path = .

# SQLAlchemy connection URL — overridden in env.py from .env
# Do not put real credentials here
sqlalchemy.url = postgresql://user:password@localhost/dbname

[post_write_hooks]
# Uncomment to auto-format generated migrations with black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 120

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
