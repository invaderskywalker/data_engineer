[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
logfile_maxbytes=0

[program:gunicorn]
command=/app/venv/bin/gunicorn --timeout 600 -w 1 -k eventlet -b 0.0.0.0:8000 --log-level debug src.trmeric_api.app.App:app
directory=/app
environment=PATH="/app/venv/bin:%(ENV_PATH)s",VIRTUAL_ENV="/app/venv"
autostart=true
autorestart=false
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:cron]
command=/usr/sbin/cron -f
autostart=true
autorestart=true
stdout_logfile=/app/logs/cron_service.log
stderr_logfile=/app/logs/cron_service.err
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

